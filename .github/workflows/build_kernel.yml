name: Build S25 Ultra SuSFS Kernel (6.6.98)

on:
  workflow_dispatch: # Ermöglicht den manuellen Start per Klick

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Compiler und Cross-Tools installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison git-core libncurses-dev xz-utils curl python3 clang llvm lld gcc-aarch64-linux-gnu

      - name: Offiziellen Google Kernel-Quellcode klonen
        run: |
          mkdir kernel-source && cd kernel-source
          # KORRIGIERTE URL: Holt den echten Android-Common-Kernel von Google
          git clone --depth=1 --branch android15-6.6-pkvm_release_6.6.98 https://googlesource.com .

      - name: SuSFS Patches einbinden
        run: |
          # KORRIGIERTE URL: Holt das echte, vollwertige SuSFS-Repository
          git clone https://github.com susfs-repo
          
          cd kernel-source
          # Kopiert die korrekten Patches für Kernel 6.6
          cp ../susfs-repo/Kernel_Patches/Kernel_6.6/* ./
          git apply *.patch || echo "Einige Patches wurden mit Warnungen angewendet"

      - name: Samsung Knox Defex deaktivieren & SuSFS aktivieren
        run: |
          cd kernel-source
          # Schaltet Samsungs Knox-Absturzsicherung (Defex) ab
          sed -i 's/CONFIG_SECURITY_DEFEX=y/CONFIG_SECURITY_DEFEX=n/g' arch/arm64/configs/gki_defconfig
          # Aktiviert SuSFS in der Kernel-Konfiguration
          echo "CONFIG_SUSFS=y" >> arch/arm64/configs/gki_defconfig

      - name: Kernel mit Clang (ARM64) kompilieren
        run: |
          cd kernel-source
          # Generiert die Standard-GKI-Konfiguration
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 gki_defconfig
          # Kompiliert das rohe Kernel-Image mit allen Kernen der Cloud
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 -j$(nproc) Image

      - name: Fertiges Kernel-Image sichern
        uses: actions/upload-artifact@v4
        with:
          name: S25U-SuSFS-Kernel-6.6.98
          path: kernel-source/arch/arm64/boot/Image
